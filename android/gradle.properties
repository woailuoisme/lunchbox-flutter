# Gradle settings for Android
# ---------------------------

# JVM arguments for the Gradle daemon
# Optimized for performance while maintaining stability.
# Enforce UTF-8 encoding for consistency across different environments.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
# Use AndroidX for better compatibility with modern libraries
android.useAndroidX=true
android.enableJetifier=true
# Enable Gradle daemon for faster subsequent builds
org.gradle.daemon=true
# Enable parallel execution for faster builds
org.gradle.parallel=true
# Enable build caching to reuse results from previous builds
org.gradle.caching=true
# Enable configuration on demand to only configure relevant projects
org.gradle.configureondemand=true
# Use file system watching to speed up builds (Gradle 6.5+)
org.gradle.vfs.watch=true
# Configuration caching can speed up the configuration phase, but may cause issues with some plugins (like Flutter/Kotlin)
org.gradle.configuration-cache=false

# Kotlin code style
kotlin.code.style=official
