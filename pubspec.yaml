name: lunchbox
description: "饭盒售货机应用 - 基于 Flutter 的移动应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

# 核心依赖
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  get_it: ^9.2.1
  injectable: ^2.7.1+4

  # 路由与网络
  go_router: ^17.1.0
  dio: ^5.9.1
  dio_http2_adapter: ^2.6.0
  retrofit: ^4.9.2
  connectivity_plus: ^7.0.0

  # 存储
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: any

  # 基础 UI
  flutter_screenutil: ^5.9.3
  flex_color_scheme: ^8.4.0
  material_symbols_icons: ^4.2906.0
  flutter_svg: ^2.2.3
  flutter_animate: ^4.5.2
  animations: ^2.1.1

  # 扩展 UI 组件
  toastification: ^3.0.3
  cached_network_image: ^3.4.1
  infinite_scroll_pagination: ^5.1.1
  custom_refresh_indicator: ^4.0.1
  flutter_spinkit: ^5.2.2
  introduction_screen: ^4.0.0
  flutter_slidable: ^4.0.3
  flutter_staggered_grid_view: ^0.7.0
  toggle_switch: ^2.3.0
  expandable: ^5.0.1
  carousel_slider: ^5.1.2
  smooth_page_indicator: ^2.0.1
  skeletonizer: ^2.1.3
  webview_flutter: ^4.13.1
  qr_flutter: ^4.1.0
  convex_bottom_bar: ^3.2.0
  google_nav_bar: ^5.0.7
  scrollable_positioned_list: ^0.3.8
  alphabet_list_view: ^1.2.0
  timelines_plus: ^1.0.8
  page_transition: ^2.2.1
  badges: ^3.1.2
  awesome_dialog: ^3.3.0
  upgrader: ^12.5.0

  # 地图与定位
  flutter_map: ^8.2.2
  geolocator: ^14.0.2
  latlong2: any

  # 系统与设备功能
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  share_plus: ^12.0.1
  permission_handler: ^12.0.1
  local_auth: ^3.0.1
  flutter_local_notifications: any
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  mobile_scanner: ^7.2.0

  # 业务功能
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  mask_text_input_formatter: ^2.9.0
  phone_form_field: ^10.0.17
  pinput: ^6.0.2
  google_sign_in: ^7.2.0
  flutter_stripe: ^12.3.0
  slang_flutter: ^4.12.1
  firebase_core: ^4.4.0
  firebase_analytics: ^12.1.2
  sentry_flutter: ^9.14.0
  sentry_dio: ^9.14.0

  # 逻辑工具与日志
  intl: ^0.20.2
  lpinyin: ^2.0.3
  talker_flutter: ^5.1.14
  talker_dio_logger: ^5.1.14
  fpdart: ^1.2.0
  path:

  # 代码生成注解
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  built_value: ^8.12.4
  envied: ^1.3.3

  flutter_native_splash: any



dev_dependencies:
  # 测试
  flutter_test:
    sdk: flutter
  test: ^1.30.0
  mockito: ^5.6.3
  riverpod: ^3.2.1

  # 代码规范
#  analyzer: ^10.0.0
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.1.3

  # 代码生成器
  build_runner: ^2.11.1
  riverpod_generator: ^4.0.3
  retrofit_generator: ^10.2.3
  injectable_generator: ^2.12.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  drift_dev: ^2.32.0
  envied_generator: ^1.3.3
  go_router_builder: ^4.2.0

  # 开发工具
  flutter_launcher_icons: ^0.14.4
# 版本覆盖
dependency_overrides:
  meta: ^1.18.1
  analyzer: ^10.0.0
  test_api: 0.7.10

flutter:
  uses-material-design: true

  # 资源配置
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/html/

flutter_native_splash:
  color: "#16A34A"
  android_12:
    color: "#16A34A"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
