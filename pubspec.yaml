name: lunchbox
description: "饭盒售货机应用 - 基于 Flutter 的移动应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

# 核心依赖
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # 路由与网络
  go_router: ^17.1.0
  dio: ^5.9.1
  retrofit: ^4.9.0
  connectivity_plus: ^7.0.0
  web_socket_channel: ^3.0.3
  mqtt_client: ^10.11.9

  # 存储
  shared_preferences: ^2.5.4
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.41

  # 基础 UI
  cupertino_icons: ^1.0.8
  lucide_icons_flutter: ^3.1.9
  font_awesome_flutter: ^10.12.0
  flutter_svg: ^2.2.3
  lottie: ^3.3.2

  # 扩展 UI
  toastification: ^3.0.3
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.3
  flutter_animate: ^4.5.2
  infinite_scroll_pagination: ^5.1.1
  flex_color_scheme: ^8.4.0
  convex_bottom_bar: ^3.2.0
  introduction_screen: ^4.0.0
  flutter_spinkit: ^5.2.2
  flutter_slidable: ^4.0.3
  smooth_page_indicator: ^2.0.1
  carousel_slider: ^5.1.1
  skeletonizer: ^2.1.2
  flutter_html: ^3.0.0
  qr_flutter: ^4.1.0
  google_nav_bar: ^5.0.7

  # 业务功能
  flutter_stripe: ^12.2.0
  upgrader: ^12.5.0
  slang_flutter: ^4.12.1
  formz: ^0.8.0

  # 系统与设备功能
  geolocator: ^14.0.2
  device_info_plus: ^12.3.0
  permission_handler: ^12.0.1
  camera: ^0.11.3
  image_picker: ^1.2.1
  google_maps_flutter: ^2.14.0
  local_auth: ^3.0.0
  flutter_local_notifications: ^20.0.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  package_info_plus: ^9.0.0
  app_settings: ^7.0.0

  # 逻辑工具
  intl: ^0.20.2
  logger: ^2.6.2
  fpdart: ^1.2.0
  rxdart: ^0.28.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0

# 开发依赖
  pretty_dio_logger: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.1.3
  mockito: ^5.6.3

  # 代码生成
  build_runner: ^2.11.0
  riverpod_generator: ^4.0.3
  retrofit_generator: ^10.2.1
  freezed: ^3.2.5
  json_serializable: ^6.12.0

  # 开发辅助
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

  # 测试支持
  riverpod: any
  test: ^1.29.0

  melos: ^7.4.0

# 版本覆盖
dependency_overrides:
  test_api: 0.7.9

flutter:
  uses-material-design: true

  # 资源配置
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21

melos:
  packages:
    - .
  scripts:
    analyze:
      run: ./scripts/melos.sh analyze
      description: 运行静态代码分析

    analyze-strict:
      run: ./scripts/melos.sh analyze-strict
      description: 严格模式代码分析 (警告/提示均视为失败)

    format:
      run: ./scripts/melos.sh format
      description: 格式化代码

    fix:
      run: ./scripts/melos.sh fix
      description: 自动修复代码问题

    test:
      run: ./scripts/melos.sh test
      description: 运行测试

    build:runner:
      run: ./scripts/melos.sh build
      description: 运行 build_runner 生成代码

    watch:
      run: ./scripts/melos.sh watch
      description: 运行 build_runner 监听模式

    gen:i18n:
      run: ./scripts/melos.sh gen:i18n
      description: 生成国际化代码

    gen:icons:
      run: ./scripts/melos.sh gen:icons
      description: 生成应用图标
    
    build:apk:
      run: ./scripts/melos.sh build:apk
      description: 构建 Android APK
    
    build:ios:
      run: ./scripts/melos.sh build:ios
      description: 构建 iOS IPA

    run:offline:
      run: ./scripts/melos.sh run:offline
      description: 离线运行 (指定设备)

    clean:
      run: ./scripts/melos.sh clean
      description: 清理构建文件

    prepare:
      run: ./scripts/melos.sh prepare
      description: 准备开发环境 (bootstrap + build + i18n)