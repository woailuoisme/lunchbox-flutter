name: Flutter Build & Release app

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Build Android APK'
        required: false
        type: boolean
        default: true
      build_appbundle:
        description: 'Build Android AppBundle (AAB)'
        required: false
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS App'
        required: false
        type: boolean
        default: false
      build_mode:
        description: 'Build Mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  prepare:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_tasks: ${{ steps.set-matrix.outputs.has_tasks }}
      timestamp: ${{ steps.set-timestamp.outputs.time }}
    steps:
      - id: set-timestamp
        run: echo "time=$(TZ='Asia/Shanghai' date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT
      - id: set-matrix
        run: |
          TASKS=()
          if [ "${{ github.event.inputs.build_apk }}" == "true" ]; then TASKS+=("apk"); fi
          if [ "${{ github.event.inputs.build_appbundle }}" == "true" ]; then TASKS+=("appbundle"); fi
          if [ "${{ github.event.inputs.build_ios }}" == "true" ]; then TASKS+=("ios"); fi

          if [ ${#TASKS[@]} -eq 0 ]; then
            echo "has_tasks=false" >> $GITHUB_OUTPUT
            echo "matrix={\"task\":[]}" >> $GITHUB_OUTPUT
          else
            JSON_TASKS=$(printf '%s\n' "${TASKS[@]}" | jq -R . | jq -s -c .)
            echo "has_tasks=true" >> $GITHUB_OUTPUT
            echo "matrix={\"task\":$JSON_TASKS}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.has_tasks == 'true'
    name: Build ${{ matrix.task }}
    runs-on: ${{ matrix.task == 'ios' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.task != 'ios'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Restore Environment Files
        run: |
          echo "${{ secrets.ENV_PROD }}" > .env.prod
          echo "${{ secrets.ENV_DEV }}" > .env.dev

      - name: Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze Build Size (Release only)
        if: github.event.inputs.build_mode == 'release'
        run: |
          flutter build apk --release --analyze-size --target-platform android-arm64
          echo "📊 Build size analysis completed. Check logs above for details."

      - name: Build Task
        run: |
          BUILD_MODE="${{ github.event.inputs.build_mode }}"
          TIME="${{ needs.prepare.outputs.timestamp }}"
          if [ "${{ matrix.task }}" == "apk" ]; then
            if [ "$BUILD_MODE" == "release" ]; then
              # 构建所有 ABI（兼容性最好，生成 3 个 APK）
              flutter build apk --release \
                --obfuscate \
                --split-debug-info=build/app/outputs/symbols \
                --split-per-abi \
                --tree-shake-icons
              # 重命名所有拆分的 APK
              for file in build/app/outputs/flutter-apk/app-*-release.apk; do
                if [ -f "$file" ]; then
                  filename=$(basename "$file")
                  # 提取 ABI 名称 (例如: app-armeabi-v7a-release.apk -> armeabi-v7a)
                  abi=$(echo "$filename" | sed 's/app-\(.*\)-release.apk/\1/')
                  mv "$file" "build/app/outputs/flutter-apk/apk-$abi-release-$TIME.apk"
                fi
              done
            else
              flutter build apk --$BUILD_MODE
              mv build/app/outputs/flutter-apk/app-$BUILD_MODE.apk build/app/outputs/flutter-apk/apk-$BUILD_MODE-$TIME.apk
            fi
          elif [ "${{ matrix.task }}" == "appbundle" ]; then
            # 生产构建优化：启用混淆、Tree-shaking
            if [ "$BUILD_MODE" == "release" ]; then
              flutter build appbundle --release \
                --obfuscate \
                --split-debug-info=build/app/outputs/symbols \
                --tree-shake-icons
              mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/aab-release-$TIME.aab
            else
              flutter build appbundle --$BUILD_MODE
              mv build/app/outputs/bundle/debug/app-debug.aab build/app/outputs/bundle/debug/aab-debug-$TIME.aab
            fi
          elif [ "${{ matrix.task }}" == "ios" ]; then
            flutter build ios --release --no-codesign \
              --obfuscate \
              --split-debug-info=build/ios/symbols \
              --tree-shake-icons
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.task }}-${{ github.event.inputs.build_mode }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/*/*.aab
            build/ios/iphoneos/*.app
            build/ios/iphoneos/*.ipa
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload Debug Symbols (Release only)
        if: github.event.inputs.build_mode == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: symbols-${{ matrix.task }}
          path: |
            build/app/outputs/symbols/**
            build/ios/symbols/**
          compression-level: 9
          if-no-files-found: ignore

  release:
    needs: [prepare, build]
    name: Create Unified Release
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*-*" # Matches all matrix build names (e.g., apk-release, ios-release)

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ needs.prepare.outputs.timestamp }}
          name: Build ${{ needs.prepare.outputs.timestamp }}
          files: artifacts/**/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
