name: Manual Build & Release

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Build Android APK'
        required: false
        type: boolean
        default: true
      build_appbundle:
        description: 'Build Android AppBundle (AAB)'
        required: false
        type: boolean
        default: false
      build_ios:
        description: 'Build iOS App'
        required: false
        type: boolean
        default: false
      build_mode:
        description: 'Build Mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  prepare:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_tasks: ${{ steps.set-matrix.outputs.has_tasks }}
    steps:
      - id: set-matrix
        run: |
          TASKS=()
          if [ "${{ github.event.inputs.build_apk }}" == "true" ]; then TASKS+=("apk"); fi
          if [ "${{ github.event.inputs.build_appbundle }}" == "true" ]; then TASKS+=("appbundle"); fi
          if [ "${{ github.event.inputs.build_ios }}" == "true" ]; then TASKS+=("ios"); fi

          if [ ${#TASKS[@]} -eq 0 ]; then
            echo "has_tasks=false" >> $GITHUB_OUTPUT
            echo "matrix={\"task\":[]}" >> $GITHUB_OUTPUT
          else
            JSON_TASKS=$(printf '%s\n' "${TASKS[@]}" | jq -R . | jq -s -c .)
            echo "has_tasks=true" >> $GITHUB_OUTPUT
            echo "matrix={\"task\":$JSON_TASKS}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.has_tasks == 'true'
    name: Build ${{ matrix.task }}
    runs-on: ${{ matrix.task == 'ios' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.task != 'ios'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Restore Environment Files
        run: |
          echo "${{ secrets.ENV_PROD }}" > .env.prod
          echo "${{ secrets.ENV_DEV }}" > .env.dev

      - name: Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Set Beijing Timestamp
        id: timestamp
        run: echo "time=$(TZ='Asia/Shanghai' date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Build Task
        run: |
          BUILD_MODE="${{ github.event.inputs.build_mode }}"
          if [ "${{ matrix.task }}" == "apk" ]; then
            flutter build apk --$BUILD_MODE
            # Rename APK
            mv build/app/outputs/flutter-apk/app-$BUILD_MODE.apk build/app/outputs/flutter-apk/apk-$BUILD_MODE-${{ steps.timestamp.outputs.time }}.apk
          elif [ "${{ matrix.task }}" == "appbundle" ]; then
            flutter build appbundle --$BUILD_MODE
            # Rename AAB (Path varies by build mode)
            # Release: build/app/outputs/bundle/release/app-release.aab
            # Debug: build/app/outputs/bundle/debug/app-debug.aab
            if [ "$BUILD_MODE" == "release" ]; then
              mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/aab-release-${{ steps.timestamp.outputs.time }}.aab
            else
              mv build/app/outputs/bundle/debug/app-debug.aab build/app/outputs/bundle/debug/aab-debug-${{ steps.timestamp.outputs.time }}.aab
            fi
          elif [ "${{ matrix.task }}" == "ios" ]; then
            flutter build ios --release --no-codesign
          fi

      - name: Create Release
        if: matrix.task != 'ios'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.timestamp.outputs.time }}
          name: Build ${{ steps.timestamp.outputs.time }}
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/*/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
