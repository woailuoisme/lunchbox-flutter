<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none"
  xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：圆角矩形，App 主题色 #16A34A -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#16A34A" />

  <!-- 主体：简化版饭盒图标 (白色) -->
  <g transform="translate(256, 300)">
    <!-- 饭盒主体 -->
    <rect x="0" y="120" width="512" height="320" rx="40" fill="white" />
    <!-- 饭盒盖子 -->
    <rect x="40" y="40" width="432" height="60" rx="30" fill="white" />
    <!-- 提手/装饰 -->
    <rect x="180" y="0" width="152" height="30" rx="15" fill="white" opacity="0.8" />

    <!-- 分隔线 (背景色透明度) -->
    <rect x="0" y="240" width="512" height="20" fill="#16A34A" opacity="0.2" />
  </g>
</svg>
